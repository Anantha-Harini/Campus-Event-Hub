spring.application.name=event-registration

# Database Configuration (reads from Render environment variables, falls back to local defaults)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/eventdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 console (not used)
spring.h2.console.enabled=false


# Server port (Render sets PORT env variable)
server.port=${PORT:8080}