<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Schedule - Event Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #0f172a 60%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
            padding-bottom: 50px;
            text-align: center;
        }
        h1 {
            margin-top: 50px;
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #cbd5e1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #94a3b8;
            font-weight: 300;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px auto;
            max-width: 1200px;
            gap: 25px;
            padding: 0 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.06);
            width: 270px;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(167, 139, 250, 0.3);
            box-shadow: 0 15px 30px rgba(167, 139, 250, 0.12);
        }
        .card-banner {
            height: 130px;
            background-size: cover;
            background-position: center;
        }
        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
        }
        .card .speaker {
            font-size: 13px;
            color: #c084fc;
            font-weight: 500;
            margin-bottom: 15px;
        }
        .card-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 13px;
            color: #cbd5e1;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }
        .card-details div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-details i {
            color: #64748b;
            width: 16px;
        }
        a.back {
            display: inline-block;
            margin-top: 40px;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        a.back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body>
    <h1>Master Event Schedule</h1>
    <p class="subtitle">Complete catalog of ongoing and upcoming college activities</p>

    <div class="cards">
        <div class="card" th:each="e : ${events}">
            <div class="card-banner" th:style="'background-image: url(' + ${e.bannerUrl} + ')'"></div>
            <div class="card-body">
                <div>
                    <h3 th:text="${e.name}">Coding Workshop</h3>
                    <div class="speaker" th:text="${'By ' + e.speaker}">By Dr. Clara Oswald</div>
                </div>
                <div class="card-details">
                    <div>
                        <i class="fas fa-calendar"></i>
                        <span th:text="${#temporals.format(e.eventDate, 'dd MMM yyyy')}">10 Nov 2025</span>
                    </div>
                    <div>
                        <i class="fas fa-clock"></i>
                        <span th:text="${#temporals.format(e.eventDate, 'hh:mm a')}">10:00 AM</span>
                    </div>
                    <div>
                        <i class="fas fa-location-dot"></i>
                        <span th:text="${e.venue}">Second Floor Lab</span>
                    </div>
                    <div>
                        <i class="fas fa-chair"></i>
                        <span th:text="${e.capacity + ' Maximum Seats'}">50 Seats</span>
                    </div>
                </div>
                <div sec:authorize="hasRole('ADMIN')" style="margin-top: 15px; display: flex; gap: 10px; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 15px;">
                    <a th:href="@{/admin/events/edit/{id}(id=${e.id})}" style="flex: 1; text-align: center; text-decoration: none; font-size: 13px; color: #fff; background: rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.4); padding: 8px; border-radius: 8px; font-weight: 500; transition: all 0.3s;" onmouseover="this.style.background='rgba(139, 92, 246, 0.4)'" onmouseout="this.style.background='rgba(139, 92, 246, 0.2)'">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    <form th:action="@{/admin/events/delete/{id}(id=${e.id})}" method="post" style="flex: 1; display: inline;" onsubmit="return showCustomConfirm('Are you sure you want to delete this event? This will also remove all student registrations for this event.', this)">
                        <button type="submit" style="width: 100%; font-family: inherit; font-size: 13px; color: #fff; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); padding: 8px; border-radius: 8px; font-weight: 500; cursor: pointer; transition: all 0.3s;" onmouseover="this.style.background='rgba(239, 68, 68, 0.4)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.2)'">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Redirects back based on role (standard Security endpoints redirect to root '/' which automatically routes based on role!) -->
    <a class="back" href="/"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <!-- Custom Confirmation Modal -->
    <div id="customConfirmModal" class="confirm-modal-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center;">
        <div class="confirm-modal-card" style="background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
            <i class="fas fa-triangle-exclamation" style="font-size: 40px; color: #f59e0b; margin-bottom: 20px;"></i>
            <h3 style="font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 12px;">Confirm Action</h3>
            <p id="customConfirmText" style="font-size: 14px; color: #cbd5e1; margin-bottom: 24px; line-height: 1.5;">Do you really want to proceed?</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button id="customConfirmCancel" type="button" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #cbd5e1; font-weight: 600; cursor: pointer; transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">No, Go Back</button>
                <button id="customConfirmYes" type="button" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); color: #fff; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='none'">Yes, Confirm</button>
            </div>
        </div>
    </div>

    <script>
        let pendingFormSubmit = null;

        function showCustomConfirm(message, formElement) {
            pendingFormSubmit = formElement;
            document.getElementById('customConfirmText').innerText = message;
            document.getElementById('customConfirmModal').style.display = 'flex';
            return false;
        }

        document.getElementById('customConfirmCancel').addEventListener('click', function() {
            document.getElementById('customConfirmModal').style.display = 'none';
            pendingFormSubmit = null;
        });

        document.getElementById('customConfirmYes').addEventListener('click', function() {
            if (pendingFormSubmit) {
                pendingFormSubmit.submit();
            }
        });
    </script>
</body>
</html>
