<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #0f172a 60%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            position: relative;
            padding: 40px 20px;
        }
        body::before {
            content: "";
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: #8b5cf6;
            filter: blur(100px);
            opacity: 0.35;
            top: 20%;
            left: 20%;
        }
        body::after {
            content: "";
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: #ec4899;
            filter: blur(100px);
            opacity: 0.35;
            bottom: 20%;
            right: 20%;
        }
        .card {
            background: rgba(30, 41, 59, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        .header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #f8fafc, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .back-link:hover {
            color: #fff;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-group {
            margin-bottom: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h2>Create New Event</h2>
            <a href="/admin/home" class="back-link"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>

        <form th:action="@{/admin/events/new}" th:object="${event}" method="post">
            <div class="form-group">
                <label for="name">Event Name</label>
                <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="e.g. AI & ML Summit" required />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="speaker">Speaker / Host</label>
                    <input type="text" id="speaker" th:field="*{speaker}" class="form-control" placeholder="e.g. Dr. Jane Doe" required />
                </div>

                <div class="form-group">
                    <label for="venue">Venue</label>
                    <input type="text" id="venue" th:field="*{venue}" class="form-control" placeholder="e.g. Auditorium Hall A" required />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="eventDate">Event Date & Time</label>
                    <input type="datetime-local" id="eventDate" th:field="*{eventDate}" class="form-control" required />
                </div>

                <div class="form-group">
                    <label for="capacity">Seat Capacity</label>
                    <input type="number" id="capacity" th:field="*{capacity}" class="form-control" min="1" placeholder="e.g. 100" required />
                </div>
            </div>

            <div class="form-group">
                <label for="bannerUrl">Banner Image URL</label>
                <input type="url" id="bannerUrl" th:field="*{bannerUrl}" class="form-control" placeholder="https://images.unsplash.com/..." />
                <span style="font-size: 11px; color: #64748b;">Leave blank for default abstract banner.</span>
            </div>

            <div class="form-group">
                <label for="description">Event Description</label>
                <textarea id="description" th:field="*{description}" class="form-control" placeholder="Describe what the event is about..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-plus"></i>
                <span>Publish Event</span>
            </button>
        </form>
    </div>
</body>
</html>
